# ============================================================================
# 阿里云生产部署 compose（单容器，沿用外部 MySQL/Redis）
# ----------------------------------------------------------------------------
# 用法（在阿里云服务器 /opt/coai 下）：
#   1. 准备 .env（复制 .env.prod.example，填 COAI_IMAGE / HOST_PORT）
#   2. 上传 config/config.yaml（含外部 DB 连接与密钥，不进镜像，单独传）
#   3. docker compose -f docker-compose.prod.yaml --env-file .env up -d
#
# 说明：
#   - 只跑 coai 一个容器；MySQL/Redis 沿用 config/config.yaml 里的外部地址
#     （与现有项目一致，当前为 120.76.157.51），本 compose 不再自带 db/redis。
#   - 仅用环境变量强制 serve_static=true，保证单容器同时托管前端静态文件+API；
#     mysql/redis 等连接完全交给 config/config.yaml，不做覆盖。
#   - 挂载 ./storage 持久化图片：生成图(storage/results) + 上传图(storage/uploads)。
# ============================================================================
services:
  chatnio:
    image: ${COAI_IMAGE}
    container_name: coai
    restart: always
    ports:
      - "${HOST_PORT:-8000}:8094"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    # 只覆盖 serve_static（config.yaml 里是 false，单容器部署需 true）。
    # mysql/redis 连接不在这里设置，沿用 config/config.yaml 的外部地址。
    environment:
      SERVE_STATIC: "true"
    volumes:
      - ./config:/config       # 运行配置（含外部 DB 连接、密钥）
      - ./logs:/logs           # 日志
      - ./storage:/storage     # 图片持久化：storage/results(生成) + storage/uploads(上传)
