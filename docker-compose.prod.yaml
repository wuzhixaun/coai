# ============================================================================
# 阿里云生产部署 compose
# ----------------------------------------------------------------------------
# 用法（在阿里云服务器上）：
#   1. 准备 .env（复制 .env.prod.example 改写 COAI_IMAGE 为你的 ACR 镜像地址）
#   2. 准备 config/config.yaml（含密钥，不进镜像，单独上传；注意改 serve_static/host）
#   3. docker compose -f docker-compose.prod.yaml --env-file .env up -d
#
# 说明：
#   - chatnio 服务用你自己构建并推送到阿里云 ACR 的镜像（非官方镜像）。
#   - 数据库/缓存用本 compose 自带的 mysql + redis 容器，数据落在 ./db、./redis。
#   - 若改用外部已有 DB，删掉 mysql/redis 两个 service 及 depends_on/links，
#     并把 config/config.yaml 里的 mysql.host / redis.host 指向外部地址。
# ============================================================================
services:
  mysql:
    image: mysql:8.0
    container_name: coai-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    expose:
      - "3306"
    volumes:
      - ./db:/var/lib/mysql
    networks:
      - coai-network

  redis:
    image: redis:7-alpine
    container_name: coai-redis
    restart: always
    expose:
      - "6379"
    volumes:
      - ./redis:/data
    networks:
      - coai-network

  chatnio:
    image: ${COAI_IMAGE}
    container_name: coai
    restart: always
    ports:
      - "${HOST_PORT:-8000}:8094"
    depends_on:
      - mysql
      - redis
    links:
      - mysql
      - redis
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    # 这些环境变量会通过 viper.AutomaticEnv 覆盖 config/config.yaml 里的同名启动项，
    # 确保单容器部署下 DB 指向本 compose 的容器、且前端由后端托管，无需改 config.yaml。
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DB: ${MYSQL_DATABASE}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      SERVE_STATIC: "true"
    volumes:
      - ./config:/config
      - ./logs:/logs
      - ./storage:/storage
    networks:
      - coai-network

networks:
  coai-network:
    driver: bridge
